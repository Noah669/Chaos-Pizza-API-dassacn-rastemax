stages:
  - build
  - test
  - analyze

# Installation des dépendances
cache:
  paths:
    - node_modules/

install_dependencies:
  stage: build
  image: node:18
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Exécution des tests de base
run_tests:
  stage: test
  image: node:18
  script:
    - npm run load-test -- --duration 1 --arrival-rate 1 # Petit test rapide
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# Analyse SonarQube
sonarqube-check:
  stage: analyze
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner -Dsonar.qualitygate.wait=true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
